<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>position absolute & relative</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      .parent {
        width: 300px;
        height: 300px;
        background: #eee;
      }
      .child {
        width: 100px;
        height: 100px;
        background: rgba(225,0,0,0.5);
      border: 8px solid;
    box-sizing: border-box;}
      .child::before {
        font-size: 32px;
        color: white;
      }
      .child:nth-child(2) {
        background: rgba(61, 207, 61, 0.459);
      }
      .child:nth-child(3) {
        background: rgb(110, 110, 224);
      }
      .child:nth-child(1):before {
        content: "1";
      }
      .child:nth-child(2):before {
        content: "2";
      }
      .child:nth-child(3):before {
        content: "3";
      }
    </style>

    <!-- <link rel="stylesheet" href="css/ex2-61-a.css"> -->
    <!-- <link rel="stylesheet" href="css/ex2-61-b.css"> -->
    <!-- <link rel="stylesheet" href="css/ex2-61-c.css"> -->
     <link rel="stylesheet" href="css/ex2-61-d.css">
  </head>
  </head>
  <body>
    <div class="parent">
      <div class="child red"></div>
      <div class="child green"></div>
      <div class="child blue"></div>
    </div>
  </body>
</html>
