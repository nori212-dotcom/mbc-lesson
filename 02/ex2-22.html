<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webfont</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gasoek+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=settings_heart"
    />
    <style>
      @font-face {
        font-family: "OngleipParkDahyeon";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2")
          format("woff2");
        font-weight: normal;
        font-display: swap;
      }
    </style>
    <style>
      .t1 {
        font-family: "Gasoek One", sans-serif;
        font-weight: 400;
        font-style: normal;
      }
      .t2 {
        font-family: "OngleipParkDahyeon";
      }
      .material-symbols-outlined:hover {
        color: red;
        font-size: 1em;
      }
    </style>
  </head>
  <body>
    <div class="t1">
      <span class="material-symbols-outlined"> settings_heart </span>오늘의
      진료는 본관에서 실시합니다.
    </div>
    <div class="t2">오늘의 진료는 본관에서 실시합니다.</div>
  </body>
</html>
