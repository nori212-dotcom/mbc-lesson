<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>동적 관련 가상 클래스 선택자</title>
    <style>
      input:hover {
        border: 3px solid red;
        background-color: pink;
      }
      input:focus {
        border: none;
        background-color: red;
        color: white;
        outline: 4px dashed palevioletred;
      }
    </style>
  </head>
  <body>
    <h1>동적 관련 가상 클래스 선택자</h1>
    <hr />
    <h3>로그인</h3>
    <form>
      아이디 <input type="text" /><br />
      비밀번호 <input type="password" /><br />
      <input type="submit" value="login" />
    </form>
  </body>
</html>
