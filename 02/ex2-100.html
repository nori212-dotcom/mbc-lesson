<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .wrap {
        width: 300px;
        height: 300px;
        margin: auto;
        position: relative;
        border-radius: 30px;
        background: peachpuff url(img/bg_animation.png) no-repeat center center ; background-size: 100px;
      }
      .box {
        position: absolute;
        left: 100px;
        top: 100px;
      }
      .box::before {
        content: "";
        position: absolute;
        background: url(img/ani_spade.png) no-repeat;
        width: 80px;
        height: 80px;
        left: 10px;
        animation: beat 2s infinite ease;
      }
      @keyframes beat {
        to {
          transform: scale(calc(var(--s) * 1));
          opacity: 0;
        }
      }
      .box:nth-child(1) {
        --s: 1.6;
      }
      .box:nth-child(2) {
        --s: 1.5;
      }
      .box:nth-child(3) {
        --s: 1.4;
      }
      .box:nth-child(4) {
        --s: 1.3;
      }
      .box:nth-child(5) {
        --s: 1.2;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
