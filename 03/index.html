<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARC - home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-viewport">
        <header class="header">
            <h1 class="logo">ARC.</h1>
            <nav class="nav-links">
                <a href="index.html" class="nav-link active">Home</a>
                <a href="community.html" class="nav-link">Feed</a>
            </nav>
        </header>

        <main class="canvas-section">
            <div class="canvas-container">
                <div id="arc-preview"></div>
            </div>
        </main>

        <section class="controller-container">
            <!-- 시안의 Action Sheet 스타일 그룹 -->
            <div class="action-group">
                <div class="control-item">
                    <span class="control-label">TEXT</span>
                    <input type="text" id="text-input" value="BEND YOUR TYPE">
                </div>
                <div class="control-item">
                    <span class="control-label">RADIUS</span>
                    <input type="range" id="radius-slider" min="50" max="300" value="150">
                </div>
                <div class="control-item">
                    <span class="control-label">SPACING</span>
                    <input type="range" id="spacing-slider" min="1" max="25" value="12">
                </div>
                <div class="control-item">
                    <span class="control-label">DIRECTION</span>
                    <select id="direction-select">
                        <option value="1">Convex (Up)</option>
                        <option value="-1">Concave (Down)</option>
                    </select>
                </div>
            </div>

            <div class="action-group">
                <button id="theme-toggle" class="action-button" style="background: none; border-radius: 0;">Switch Theme</button>
            </div>

            <button id="publish-btn" class="action-button publish">Publish to Community</button>
        </section>
    </div>

    <script src="js/arc-engine.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
