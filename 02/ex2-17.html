<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pseudo</title>
    <!-- 의사 클래스 : 상태, 위치를 선택 -->
    <style>
      ul > li {
        background-color: gray;
      }
      li {
        margin-bottom: 20px;
      }
      a:hover {
        color: yellow;
      }
      a {
        color: black;
        text-decoration: none;
      }
    </style>
    <style>
      /* nth-child */
      li:nth-child(4) {
        background-color: beige;
      }
      li:last-child,
      li:last-child a {
        color: red;
      }
      li {
        list-style: none;
      }
    </style>
    <style>
      li::first-letter {
        font-size: 32px;
      }
      li:hover:before {
        content: "✌";
      }
      li :hover:after {
        content: "✔";
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">COMPANY</a></li>
      <li><a href="#">PRODUCT</a></li>
      <li><a href="#">SERVICE</a></li>
      <li><a href="#">COMMUNITY</a></li>
    </ul>
  </body>
</html>
