<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>3의 배수</h1>
    <script>
      let userNum = prompt("숫자입력하세요");
      userNum = Number(userNum);
      if (userNum % 3 === 0) {
        alert("3의 배수입니다.");
        console.log(userNum);
      } else if (userNum % 3 > 0) {
        alert("3의 배수가아닙니다.");
      }
    </script>
  </body>
</html>
