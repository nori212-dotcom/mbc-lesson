<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>과제1</title>
    <style>
      table,
      th,
      td {
        border: 1px solid;
      }
    </style>
    <link rel="stylesheet" href="../02/style.css">
  </head>
  <body>
    <h1><img src="./img/07.png" alt="샴푸레시피타이틀" /></h1>

    <table>
      <thead>
        <caption>
          레시피 재료
        </caption>
        <tr>
          <td style="background-color: lightgray; text-align: center"><b>재료</b></td>
          <td style="background-color: lightgray; text-align: center"><b>첨가량</b></td>
          <td style="background-color: lightgray; text-align: center"><b>48시간</b></td>
          <td style="background-color: lightgray; text-align: center"><b>대체재료</b></td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td rowspan="5"><b>수상층</b></td>
          <td>로즈마리 추출물</td>
          <td>30g</td>
          <td rowspan="3">증류수</td>
        </tr>
        <tr>
          <td>네틀추출물</td>
          <td>30g</td>
        </tr>
        <tr>
          <td>증류수</td>
          <td>90g</td>
        </tr>
        <tr>
          <td>폴리쿼터</td>
          <td>1.5g</td>
          <td>쟁탄검</td>
        </tr>
        <tr>
          <td>글리세린</td>
          <td>10g</td>
          <td>히아루론산 10g</td>
        </tr>
        <tr>
          <td rowspan="3" style="text-align: center">
            <strong>계면<br />활성제</strong>
          </td>
          <td>LES/CDE</td>
          <td>180g/ 10g</td>
          <td>CDE + LES</td>
        </tr>
        <tr>
          <td>코코베타인</td>
          <td>5g</td>
          <td>X</td>
        </tr>
        <tr>
          <td>애플 계면 활성제</td>
          <td>10g</td>
          <td>올리브 계면 활성제</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="4" style="background-color: lightgray">좋은 향을 위해서면 엘라스틴향 사용 추천</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
