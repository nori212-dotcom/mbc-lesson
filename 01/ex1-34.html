<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div</title>
    <!-- 웹표준 html5, css3, es6 -->
    <style>
      .wrap {
        margin: auto; background-color: antiquewhite;
        width: 300px;
      }
      header,
      footer,
      section {
        border: 1px solid;
      }
    </style>
  </head>
  <!-- 👈 누락되었던 닫는 태그를 추가했습니다. -->
  <body>
    <div class="wrap">
      <!-- header+section+footer -->
      <header>헤더</header>
      <section>
        <h2>semantic 태그</h2>
        섹션
      </section>
      <footer>푸터</footer>
      <!-- 👈 들여쓰기를 정렬했습니다. -->
    </div>
    <!-- 👈 wrap 디브를 닫아주었습니다. -->
  </body>
</html>
