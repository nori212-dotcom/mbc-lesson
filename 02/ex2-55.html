<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>둥근 테두리</title>
<style>
.radius{background-color: antiquewhite;
width: 100px;
height: 100px;
display: inline-block;
line-height: 100px;
text-align: center;}
.radius1{border-radius: 100px;}
.radius2{border-radius: 10px 40px;}
.radius3{border-radius: 100px 100px 0 0;}
.radius4{border-radius: 100px 15px 50px 0;}
.radius5{
width: 274px;
height: 134px;
background: #D9D9D9;
border-radius: 14px;
border-radius: 15px/70px;

}
</style>
</head>
<body>
   <span class="radius radius1">radius1</span>
   <span class="radius radius2">radius2</span>
   <span class="radius radius3">radius3</span>
   <span class="radius radius4">radius4</span>
   <span class="radius radius5">radius4</span>
</body>
</html>
