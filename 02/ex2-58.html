<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>box-sizing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background: url(img/bg_grid.png);
      }
      p {
        background-color: rgba(225, 225, 0, 0.6);
        border: 10px solid rgba(0, 0, 0, 0.5);
        width: 600px;
        height: 100px;
        margin-bottom: 10px;
      }
      .sizing {
        box-sizing: border-box;
      }
      /* 박스크기의 계산기준 지정 */
      .sizing_list {
        width: 500px;
        margin: auto;
        margin-top: 20px;
        padding: 50px;
        height: 200px;
        box-sizing: border-box;
        box-sizing: content-box;
        list-style: none;
        text-align: center;
        
        
      }
      .sizing_list li {
        background: rgba(219, 95, 95, 0.8);
        display: inline-block;
        width: 24%;
        height: 100%;
        line-height: 200px;

      }
      .sizing_list li:nth-child(odd) {
        background: rgba(219, 195, 95, 0.5);

      }
      .sizing_list li a {
        text-decoration: none;
        color: white;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body>
    <p>It's impossible not only starting good but also keeping it firm!!</p>
    <p class="sizing">
      It's impossible not only starting good but also keeping it firm!!
    </p>
    <ul class="sizing_list">
      <li><a href="#">Company</a></li>
      <li><a href="#">Service</a></li>
      <li><a href="#">Custommer</a></li>
      <li><a href="#">Community</a></li>
    </ul>
  </body>
</html>
