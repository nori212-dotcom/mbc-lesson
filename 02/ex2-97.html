<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box,
      .box1 {
        width: 100px;
        height: 100px;
        background: orange;
        margin: 50px;
        transition-duration: 1s;
        transition-property: transform;
      }
      .box:hover {
        transform: translate(97px, 135px) rotate(360deg) scale(2);
        transition-timing-function: cubic-bezier(0.178, 0.958, 0.861, -0.03);
      }
      .box1:hover::after {
        width: 100%;
      }
      .box1:hover::before {
        transform: translate(-50%, -50%) scale(1.5);
      }

      .box1 {
        position: relative;
        overflow: hidden;
      }
      .box1:after {
        position: absolute;
        left: 50px;
        top: calc(100% - 5px);
        content: "";
        /* display: block; */
        width: 0%;
        height: 5px;
        background: red;
        transform: translate(-50%, 0);
        transition: width 0.5s;
      }
      .box1::before {
        position: absolute;
        content: "";
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: rgba(52, 166, 241, 0.39);
        backdrop-filter: blur(1.5px);
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0);
        z-index: 1;
        transition: all 0.5s;
      }
    </style>
  </head>
  <body>
    <div class="box">2D Transform</div>
    <div class="box1">2D Transform</div>
    <div class="box2">2D Transform</div>
  </body>
</html>
