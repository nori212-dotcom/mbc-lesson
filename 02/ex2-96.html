<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        width: 200px;
        height: 100px;
        background: url(/02/img/bg.jpg);
        color: white;
        text-align: center;
        line-height: 100px;
        cursor: pointer;
        transition-property: transform;
        transition-duration: 1s;
        transition-timing-function: cubic-bezier(0.178, 0.958, 0.861, -0.03);
      }
      .item:hover {
        transform: scale(1.2);
      }
      .item:hover + .drop {
        display: block;
        opacity: 1;
    
      }
      .drop {
        width: 100px;
        height: 100px;
        background: url(img/14.jpg);
        /* display: none; */
        opacity: 0;
        transition-property: opacity;
        transition-duration: 1s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item">Hover ME</div>
      <div class="drop"></div>
    </div>
  </body>
</html>
