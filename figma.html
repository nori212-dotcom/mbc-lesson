<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAFEIN Banner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
        }

        .banner-container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 400px;
            background-color: #fff;
            border: 1px solid #000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .side-image {
            flex: 0 0 25%;
            height: 100%;
            background-size: cover;
            background-position: center;
        }

        .left-image {
            background-image: url('https://images.unsplash.com/photo-1555507036-ab1f4038808a?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'); /* 크루아상/커피 느낌 */
        }

        .right-image {
            background-image: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'); /* 카페 외관 느낌 */
        }

        .center-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #f2e5b5; /* 이미지의 베이지색 추출 */
            position: relative;
        }

        .text-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 60px; /* 블랙 바 공간 확보 */
        }

        .title {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
            color: #000;
        }

        .subtitle {
            font-size: 2.5rem;
            font-weight: 300;
            text-transform: uppercase;
            line-height: 1.1;
            color: #000;
            letter-spacing: 2px;
        }

        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .address {
            color: #f2e5b5;
            font-size: 1.2rem;
            letter-spacing: 5px;
            font-weight: 300;
        }

        @media (max-width: 768px) {
            .banner-container {
                flex-direction: column;
                height: auto;
            }
            .side-image {
                flex: 0 0 200px;
                width: 100%;
            }
            .title { font-size: 3rem; }
            .subtitle { font-size: 1.5rem; }
            .bottom-bar { height: 60px; }
            .address { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="banner-container">
        <!-- 좌측 이미지 영역 -->
        <div class="side-image left-image"></div>

        <!-- 중앙 콘텐츠 영역 -->
        <div class="center-content">
            <div class="text-section">
                <h1 class="title">CAFEIN</h1>
                <p class="subtitle">COFFEE, BREAD &<br>URBAN RETREAT</p>
            </div>
            <div class="bottom-bar">
                <p class="address">468 DUKE STREET</p>
            </div>
        </div>

        <!-- 우측 이미지 영역 -->
        <div class="side-image right-image"></div>
    </div>

</body>
</html>
